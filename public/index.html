<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lamination DeviceLink Builder</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="/tf.min.js"></script>
<style>
  .drop-zone{transition:all .2s}
  .drop-zone.drag-over{border-color:#3b82f6;background:#eff6ff}
  .step-indicator .step-num{transition:all .3s}
  .step-indicator .step-bar{transition:all .3s}
  .step-panel{display:none}
  .step-panel.active{display:block}
</style>
</head>
<body class="bg-gray-50 min-h-screen">
<nav class="bg-white shadow-sm border-b">
  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <h1 class="font-semibold text-gray-800 text-lg">Lamination ICC</h1>
      <span class="text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded">beta</span>
    </div>
    <span id="badge" class="text-xs px-2 py-1 rounded bg-gray-200 text-gray-500">loading...</span>
  </div>
</nav>

<main class="max-w-5xl mx-auto px-4 py-6">
  <!-- Step indicators -->
  <div class="step-indicator flex items-center gap-0 mb-8">
    <div class="flex items-center">
      <div id="s1-circle" class="step-num w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center text-sm font-bold">1</div>
      <span id="s1-label" class="ml-2 text-sm font-medium text-blue-600">Upload &amp; Analyze</span>
    </div>
    <div class="step-bar mx-3 h-0.5 w-16 bg-gray-300" id="bar-1"></div>
    <div class="flex items-center">
      <div id="s2-circle" class="step-num w-8 h-8 rounded-full bg-gray-300 text-gray-500 flex items-center justify-center text-sm font-bold">2</div>
      <span id="s2-label" class="ml-2 text-sm text-gray-400">Verify</span>
    </div>
    <div class="step-bar mx-3 h-0.5 w-16 bg-gray-300" id="bar-2"></div>
    <div class="flex items-center">
      <div id="s3-circle" class="step-num w-8 h-8 rounded-full bg-gray-300 text-gray-500 flex items-center justify-center text-sm font-bold">3</div>
      <span id="s3-label" class="ml-2 text-sm text-gray-400">Build ICC</span>
    </div>
  </div>

  <!-- STEP 1: Upload unlaminated + analyze rows -->
  <div id="step-1" class="step-panel active">
    <div class="bg-white rounded-lg shadow-sm border p-4 mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-2">1. Upload unlaminated CGATS (full chart)</label>
      <div id="dropU" class="drop-zone border-2 border-dashed border-gray-300 rounded-lg p-8 text-center cursor-pointer hover:border-blue-400">
        <p class="text-gray-400 text-sm">Drop file or click</p>
      </div>
      <input type="file" id="fileU" accept=".txt,.cgats" class="hidden">
      <div id="infoU" class="hidden mt-2 text-xs text-gray-500"></div>
    </div>

    <div id="rowsInputArea" class="bg-white rounded-lg shadow-sm border p-4 mb-4 hidden">
      <label class="block text-sm font-medium text-gray-700 mb-2">2. Total physical scan strips (rows):</label>
      <div class="flex items-center gap-3">
        <input id="totalRows" type="number" min="1" max="200" value="51" class="border rounded px-3 py-2 text-sm w-24">
        <span id="patchInfo" class="text-xs text-gray-500"></span>
        <button id="analyzeBtn" disabled class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed">Analyze rows</button>
      </div>
    </div>

    <div id="diversityArea" class="hidden">
      <div class="bg-white rounded-lg shadow-sm border p-4 mb-4">
        <h3 class="font-medium text-gray-800 mb-3">Row diversity scores</h3>
        <div id="diversityTable" class="overflow-x-auto"></div>
        <div class="mt-4 flex items-center gap-4">
          <button id="dlSubsetBtn" disabled class="px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-medium hover:bg-green-700 disabled:opacity-50 disabled:cursor-not-allowed">Download subset CGATS ↓</button>
          <span id="subsetInfo" class="text-xs text-gray-500"></span>
          <button id="toStep2Btn" disabled class="ml-auto px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed">Continue →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- STEP 2: Upload laminated + verify -->
  <div id="step-2" class="step-panel">
    <div class="bg-white rounded-lg shadow-sm border p-4 mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-2">Upload laminated CGATS (measured subset)</label>
      <div id="dropL" class="drop-zone border-2 border-dashed border-gray-300 rounded-lg p-8 text-center cursor-pointer hover:border-blue-400">
        <p class="text-gray-400 text-sm">Drop file or click</p>
      </div>
      <input type="file" id="fileL" accept=".txt,.cgats" class="hidden">
      <div id="infoL" class="hidden mt-2 text-xs text-gray-500"></div>
    </div>

    <div id="verifyArea" class="hidden">
      <div class="bg-white rounded-lg shadow-sm border p-4 mb-4">
        <h3 class="font-medium text-gray-800 mb-3">Verification</h3>
        <div id="verifyResult" class="text-sm"></div>
        <button id="toStep3Btn" disabled class="mt-4 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed">Continue →</button>
      </div>
    </div>
  </div>

  <!-- STEP 3: Build ICC -->
  <div id="step-3" class="step-panel">
    <div class="bg-white rounded-lg shadow-sm border p-4 mb-4 flex items-center gap-4">
      <label class="text-sm text-gray-600">CLUT:</label>
      <select id="clutSize" class="border rounded px-2 py-1 text-sm">
        <option value="17">17³ (fast)</option>
        <option value="33">33³ (precise)</option>
      </select>
      <button id="buildBtn" class="ml-auto px-6 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">Build DeviceLink</button>
    </div>

    <div id="progressArea" class="hidden mb-4">
      <div class="bg-white rounded-lg shadow-sm border p-4">
        <div class="flex items-center gap-3 mb-3">
          <div class="animate-spin h-5 w-5 border-2 border-blue-600 border-t-transparent rounded-full"></div>
          <span id="progressText" class="text-sm text-gray-600">Processing...</span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-2">
          <div id="progressBar" class="bg-blue-600 h-2 rounded-full" style="width:0%"></div>
        </div>
      </div>
    </div>

    <div id="resultsArea" class="hidden mb-4">
      <div class="bg-white rounded-lg shadow-sm border p-4">
        <h3 class="font-medium text-gray-800 mb-3">Results</h3>
        <div class="grid grid-cols-4 gap-4 mb-4">
          <div class="text-center p-3 bg-gray-50 rounded"><div id="statP" class="text-2xl font-bold text-gray-800">-</div><div class="text-xs text-gray-500">Patches</div></div>
          <div class="text-center p-3 bg-gray-50 rounded"><div id="statA" class="text-2xl font-bold text-gray-800">-</div><div class="text-xs text-gray-500">Anchors</div></div>
          <div class="text-center p-3 bg-gray-50 rounded"><div id="statMed" class="text-2xl font-bold text-gray-800">-</div><div class="text-xs text-gray-500">Median ΔE</div></div>
          <div class="text-center p-3 bg-gray-50 rounded"><div id="statP95" class="text-2xl font-bold text-blue-600">-</div><div class="text-xs text-gray-500">P95 ΔE</div></div>
        </div>

        <div id="previewArea" class="hidden mb-4 border-t pt-4">
          <h4 class="font-medium text-gray-800 mb-3">Preview</h4>
          <div class="mb-3 flex items-center gap-3 flex-wrap">
            <span class="text-sm text-gray-600">Image:</span>
            <select id="imgSelect" class="border rounded px-2 py-1 text-sm min-w-[160px]"></select>
            <span class="text-xs text-gray-400">or</span>
            <input type="file" id="fileImg" accept="image/*" class="text-sm max-w-[200px]">
            <span id="previewStatus" class="text-xs text-gray-400"></span>
            <span class="ml-auto flex items-center gap-1">
              <button id="zoomFitBtn" class="px-2 py-1 bg-gray-200 text-xs rounded hover:bg-gray-300">Fit</button>
              <button id="zoom100Btn" class="px-2 py-1 bg-gray-200 text-xs rounded hover:bg-gray-300">100%</button>
              <span id="zoomLabel" class="text-xs text-gray-500 w-12 text-right">fit</span>
            </span>
          </div>
          <div id="previewContainer" class="relative border rounded overflow-hidden bg-gray-100" style="width:100%;height:520px;user-select:none">
            <canvas id="previewCanvas" style="display:block;width:100%;height:100%;image-rendering:pixelated"></canvas>
            <div id="splitLine" style="position:absolute;top:0;bottom:0;width:3px;background:#fff;cursor:ew-resize;pointer-events:auto;box-shadow:0 0 4px rgba(0,0,0,.5);display:none"></div>
            <div id="colorInfo" class="absolute bottom-2 left-2 bg-black/80 text-white text-xs p-2 rounded pointer-events-none hidden font-mono leading-relaxed min-w-[280px]"></div>
            <div id="navigator" class="absolute top-2 right-2 bg-black/70 border border-white/30 rounded overflow-hidden" style="width:160px;height:107px;display:none">
              <canvas id="navCanvas" style="width:100%;height:100%"></canvas>
              <div id="navViewport" style="position:absolute;border:1.5px solid #f00;pointer-events:none;display:none"></div>
            </div>
          </div>
          <p class="text-xs text-gray-400 mt-1">Drag split line ↔ to compare · Hover for Lab values</p>
        </div>

        <button id="dlBtn" class="px-6 py-2 bg-green-600 text-white rounded-lg text-sm font-medium hover:bg-green-700">Download .icc</button>
      </div>
    </div>
  </div>
</main>

<script type="module">
import { parseCgatsText, computeRows, rowDiversityScores, generateSubsetCGATS, verifySubsetMatch } from '/dist/app.js';

// ---- state ----
let model = null, baked = null;
let uFile = null, lFile = null;
let uPatches = null, frozenCvals = null;
let analyzeResult = null;
let selectedRows = [];
let subsetText = null;
let lPatches = null;
let iccBuf = null;
let _clutData = null, _printClutData = null, _clutPoints = 17;
let _fullW = 0, _fullH = 0;
let _printOffscreen = null, _lamOffscreen = null;
let _splitRatio = 0.5;
let _isDraggingSplit = false;
let _isDraggingCanvas = false, _dragStartX = 0, _dragStartY = 0, _dragStartPanX = 0, _dragStartPanY = 0;
let _zoomFit = true, _zoom = 1; // _zoom=1 when fit, else zoom factor
let _panX = 0, _panY = 0;

// ---- step navigation ----
function goToStep(n) {
  document.querySelectorAll('.step-panel').forEach(el => el.classList.remove('active'));
  document.getElementById(`step-${n}`).classList.add('active');
  for (let i = 1; i <= 3; i++) {
    const circle = document.getElementById(`s${i}-circle`);
    const label = document.getElementById(`s${i}-label`);
    if (i < n) {
      circle.className = 'step-num w-8 h-8 rounded-full bg-green-500 text-white flex items-center justify-center text-sm font-bold';
      label.className = 'ml-2 text-sm font-medium text-green-600';
    } else if (i === n) {
      circle.className = 'step-num w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center text-sm font-bold';
      label.className = 'ml-2 text-sm font-medium text-blue-600';
    } else {
      circle.className = 'step-num w-8 h-8 rounded-full bg-gray-300 text-gray-500 flex items-center justify-center text-sm font-bold';
      label.className = 'ml-2 text-sm text-gray-400';
    }
    if (i < n) {
      document.getElementById(`bar-${i}`).className = 'step-bar mx-3 h-0.5 w-16 bg-green-500';
    } else {
      document.getElementById(`bar-${i}`).className = 'step-bar mx-3 h-0.5 w-16 bg-gray-300';
    }
  }
  if (n === 3) {
    document.getElementById('buildBtn').disabled = false;
  }
}

// ---- drop zone helper ----
function makeDropZone(idZone, idFile, idInfo) {
  const el = document.getElementById(idZone);
  const inp = document.getElementById(idFile);
  const inf = document.getElementById(idInfo);
  let file = null;
  el.onclick = () => inp.click();
  el.ondragover = e => { e.preventDefault(); el.classList.add('drag-over'); };
  el.ondragleave = () => el.classList.remove('drag-over');
  el.ondrop = e => { e.preventDefault(); el.classList.remove('drag-over'); if (e.dataTransfer.files[0]) set(e.dataTransfer.files[0]); };
  inp.onchange = () => { if (inp.files[0]) set(inp.files[0]); };
  function set(f) { file = f; inf.innerHTML = `<span class="text-green-600">&#10003;</span> ${f.name}`; inf.classList.remove('hidden'); el.querySelector('p').textContent = f.name; onFile(); }
  function onFile() { if (idZone === 'dropU') onUFile(); else onLFile(); }
  return { get file() { return file; }, reset() { file = null; inf.classList.add('hidden'); el.querySelector('p').textContent = 'Drop file or click'; } };
}
const u = makeDropZone('dropU', 'fileU', 'infoU');
const l = makeDropZone('dropL', 'fileL', 'infoL');

// ---- U file loaded ----
function onUFile() {
  const area = document.getElementById('rowsInputArea');
  area.classList.remove('hidden');
  document.getElementById('analyzeBtn').disabled = false;
}

// ---- L file loaded ----
async function onLFile() {
  if (!l.file) return;
  try {
    const text = await l.file.text();
    lPatches = parseCgatsText(text);
    doVerify();
  } catch (e) {
    document.getElementById('verifyResult').innerHTML = `<span class="text-red-600">Parse error: ${e.message}</span>`;
    document.getElementById('verifyArea').classList.remove('hidden');
  }
}

// ---- analyze rows ----
document.getElementById('analyzeBtn').onclick = async () => {
  if (!u.file || !model || !baked) return;
  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = 'Analyzing...';

  try {
    const uText = await u.file.text();
    uPatches = parseCgatsText(uText);
    const totalRows = parseInt(document.getElementById('totalRows').value) || 1;
    const ppRow = Math.ceil(uPatches.length / totalRows);

    // feature extraction
    function getFeat(p) { const f = []; for (let w = 0; w < 36; w++) f.push(p.spectra[w]); for (let w = 0; w < 36; w++) f.push(p.spectra[w] * p.spectra[w]); return f; }
    const allFeat = uPatches.map(p => getFeat(p));
    const norm = allFeat.map(r => r.map((v, j) => (v - baked.xm[j]) / baked.xs[j]));

    const t = tf.tensor2d(norm);
    const pred = model.predict(t);
    const arr = await pred.array();
    t.dispose(); pred.dispose();

    frozenCvals = arr.map(row => row.map((v, k) => v * baked.ys[k] + baked.ym[k]));

    const diversity = rowDiversityScores(frozenCvals, ppRow, uPatches.length, 1);

    analyzeResult = { totalPatches: uPatches.length, patchesPerRow: ppRow };

    renderDiversity(diversity, ppRow);
    document.getElementById('diversityArea').classList.remove('hidden');
    btn.textContent = 'Analyze rows';
  } catch (e) {
    document.getElementById('diversityArea').classList.remove('hidden');
    document.getElementById('diversityTable').innerHTML = `<span class="text-red-600">Error: ${e.message}</span>`;
    btn.textContent = 'Analyze rows';
    btn.disabled = false;
    console.error(e);
  }
};

function renderDiversity(diversity, ppRow) {
  const div = document.getElementById('diversityTable');
  let html = '<table class="w-full text-sm"><thead><tr class="border-b text-left text-gray-500"><th class="pb-2 pr-4">Row</th><th class="pb-2 pr-4">Patches</th><th class="pb-2 pr-4">Diversity</th><th class="pb-2 pr-4">Select</th></tr></thead><tbody>';
  for (const r of diversity) {
    const checked = r.isRecommended ? 'checked' : '';
    const star = r.isRecommended ? ' ★' : '';
    html += `<tr class="border-b ${r.isRecommended ? 'bg-blue-50' : ''}">
      <td class="py-2 pr-4 font-mono">Row ${r.rowIndex}${star}</td>
      <td class="py-2 pr-4">${r.patchCount} (×${ppRow} max)</td>
      <td class="py-2 pr-4 font-mono">${r.diversity.toFixed(4)}</td>
      <td class="py-2"><input type="checkbox" class="row-cb" data-row="${r.rowIndex}" ${checked}></td>
    </tr>`;
  }
  html += '</tbody></table>';
  div.innerHTML = html;

  // checkbox handler
  div.querySelectorAll('.row-cb').forEach(cb => {
    cb.onchange = () => {
      selectedRows = Array.from(div.querySelectorAll('.row-cb:checked')).map(c => parseInt(c.dataset.row));
      updateSubsetBtn();
    };
  });

  // initial selection from recommended
  selectedRows = Array.from(div.querySelectorAll('.row-cb:checked')).map(c => parseInt(c.dataset.row));
  updateSubsetBtn();
}

function updateSubsetBtn() {
  const btn = document.getElementById('dlSubsetBtn');
  const info = document.getElementById('subsetInfo');
  const to2 = document.getElementById('toStep2Btn');
  const n = selectedRows.length;
  const patches = n * analyzeResult.patchesPerRow;
  btn.disabled = n === 0;
  btn.textContent = `Download subset CGATS (${n} row${n !== 1 ? 's' : ''}, ~${patches} patches) ↓`;
  info.textContent = n > 0 ? `Total: ~${patches} patches for lamination` : 'Select at least 1 row';
  to2.disabled = true;
}

// ---- download subset ----
document.getElementById('dlSubsetBtn').onclick = async () => {
  if (!u.file || selectedRows.length === 0) return;
  try {
    const text = await u.file.text();
    subsetText = generateSubsetCGATS(text, selectedRows, analyzeResult.patchesPerRow, analyzeResult.totalPatches);
    const blob = new Blob([subsetText], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'lamination-subset.txt';
    a.click();
    URL.revokeObjectURL(url);
    document.getElementById('toStep2Btn').disabled = false;
    document.getElementById('subsetInfo').textContent += ' ✓ Downloading — now laminate those strips, measure, and proceed to Step 2';
  } catch (e) {
    document.getElementById('subsetInfo').textContent = `Error: ${e.message}`;
  }
};

document.getElementById('toStep2Btn').onclick = () => goToStep(2);

// ---- verify ----
function doVerify() {
  if (!lPatches || !analyzeResult || selectedRows.length === 0) return;
  const result = verifySubsetMatch(uPatches, lPatches, selectedRows, analyzeResult.patchesPerRow);
  const div = document.getElementById('verifyResult');
  const ok = result.ok;
  let html = `<div class="mb-3">
    <span class="font-medium ${ok ? 'text-green-600' : 'text-red-600'}">${ok ? '✓ Verified' : '✗ Mismatch'}</span>
    <span class="text-gray-600 ml-2">${result.matched} of ${result.expected} patches matched by CMYK</span>
  </div>`;
  if (result.extra.length > 0) {
    html += `<p class="text-yellow-600 text-xs">${result.extra.length} extra patches not in expected rows</p>`;
  }
  if (result.missing.length > 0) {
    html += `<p class="text-red-600 text-xs">${result.missing.length} expected CMYK combinations missing</p>`;
  }
  div.innerHTML = html;
  document.getElementById('verifyArea').classList.remove('hidden');
  document.getElementById('toStep3Btn').disabled = !ok;
}

document.getElementById('toStep3Btn').onclick = () => {
  goToStep(3);
  document.getElementById('buildBtn').disabled = false;
};

// ---- init ----
async function init() {
  const badge = document.getElementById('badge');
  try {
    badge.textContent = 'Loading model...'; badge.className = 'text-xs px-2 py-1 rounded bg-yellow-100 text-yellow-700';
    const r = await fetch('/baked-params.json'); baked = await r.json();
    model = await tf.loadLayersModel('/model/model.json');
    badge.textContent = 'Ready'; badge.className = 'text-xs px-2 py-1 rounded bg-green-100 text-green-700';
  } catch (e) {
    badge.textContent = 'Fallback mode'; badge.className = 'text-xs px-2 py-1 rounded bg-orange-100 text-orange-700';
    console.warn('Init fallback:', e);
    baked = { V: Array.from({ length: 5 }, (_, k) => Array.from({ length: 36 }, (_, w) => Math.exp(-((w - k * 7) ** 2) / 50) * (k % 2 === 0 ? 1 : -1) * 0.1)), xm: new Array(72).fill(.5), xs: new Array(72).fill(.3), ym: [0, 0, 0, 0, 0], ys: [1, 1, 1, 1, 1] };
    model = tf.sequential(); model.add(tf.layers.dense({ units: 32, inputShape: [72], activation: 'relu' })); model.add(tf.layers.dense({ units: 5 }));
  }
}
init();

// ---- load image from url ----
function loadImageFromUrl(url) {
  if (!url) return;
  document.getElementById('previewStatus').textContent = 'Loading...';
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => loadImageToProcessor(img);
  img.onerror = () => document.getElementById('previewStatus').textContent = 'Failed to load image';
  img.src = url;
}

// ---- load image list from server ----
async function loadImageList() {
  try {
    const r = await fetch('/api/images');
    const images = await r.json();
    const sel = document.getElementById('imgSelect');
    sel.innerHTML = '';
    if (images.length === 0) {
      sel.innerHTML = '<option>No images found</option>';
      return;
    }
    for (const img of images) {
      const opt = document.createElement('option');
      opt.value = img.url;
      opt.textContent = img.name;
      sel.appendChild(opt);
    }
    sel.onchange = () => { loadImageFromUrl(sel.value); };
  } catch (e) { console.warn('Image list not available:', e.message); }
}
loadImageList();

// ---- build ICC (step 3) ----
document.getElementById('buildBtn').onclick = async () => {
  if (!model || !baked || !uPatches || !lPatches) return;
  const pa = document.getElementById('progressArea');
  const ra = document.getElementById('resultsArea');
  const pt = document.getElementById('progressText');
  const pb = document.getElementById('progressBar');
  const btn = document.getElementById('buildBtn');
  pa.classList.remove('hidden'); ra.classList.add('hidden'); btn.disabled = true;

  try {
    const V = baked.V, RANK = 5;
    pt.textContent = 'Matching by CMYK...'; pb.style.width = '20%';

    const expectedIndices = new Set();
    for (const r of selectedRows) {
      const start = r * analyzeResult.patchesPerRow;
      const end = Math.min(start + analyzeResult.patchesPerRow, analyzeResult.totalPatches);
      for (let i = start; i < end; i++) expectedIndices.add(i);
    }

    // Match L → U by CMYK, only within selected rows
    const pairs = [];
    const lm = new Map();
    for (const p of lPatches) { const k = p.cmyk.join(','); if (!lm.has(k)) lm.set(k, []); lm.get(k).push(p); }
    for (const idx of expectedIndices) {
      const pu = uPatches[idx];
      const k = pu.cmyk.join(',');
      const m = lm.get(k);
      if (m && m.length > 0) { pairs.push({ u: pu, l: m[0] }); m.shift(); }
    }

    if (pairs.length < 5) throw new Error(`Only ${pairs.length} matched pairs in selected rows, need ≥5`);

    pt.textContent = `Running frozen ResNet...`; pb.style.width = '35%';

    // Get anchor frozen c-values from cached frozenCvals
    const anchorFrozen = pairs.map(p => {
      const idx = uPatches.indexOf(p.u);
      return frozenCvals[idx];
    });

    const allDeltaC = pairs.map(p => {
      const c = new Array(RANK).fill(0);
      for (let w = 0; w < 36; w++) { const d = p.l.spectra[w] - p.u.spectra[w]; for (let k = 0; k < RANK; k++) c[k] += d * V[k][w]; }
      return c;
    });

    pt.textContent = 'Fitting Ridge(5→5) residual...'; pb.style.width = '55%';
    const delta = allDeltaC.map((c, i) => c.map((v, k) => v - anchorFrozen[i][k]));
    const rm = ridgeFit(anchorFrozen, delta, 0.01);
    const predLc = frozenCvals.map(c => {
      const pd = new Array(RANK).fill(0);
      for (let j = 0; j < RANK; j++) { if (c[j] === 0) continue; for (let k = 0; k < RANK; k++) pd[k] += c[j] * rm.weights[j][k]; }
      return c.map((v, k) => v + pd[k]);
    });

    function clamp(v) { return Math.max(0, Math.min(1, v)); }
    function recL(u, c) { const p = new Float64Array(36); for (let w = 0; w < 36; w++) { let d = 0; for (let k = 0; k < RANK; k++) d += c[k] * V[k][w]; p[w] = clamp(u[w] + d); } return p; }

    pt.textContent = 'Computing Lab & ΔE00...'; pb.style.width = '70%';
    const predLab = predLc.map((c, i) => toLab(recL(uPatches[i].spectra, c)));
    const actLab = pairs.map(p => toLab(p.l.spectra));
    const matchedU = pairs.map(p => uPatches.indexOf(p.u));

    const de = [];
    for (let i = 0; i < pairs.length; i++) { const pi = matchedU[i]; if (pi < 0) continue; de.push(deltaE00(predLab[pi][0], predLab[pi][1], predLab[pi][2], actLab[i][0], actLab[i][1], actLab[i][2])); }
    de.sort((a, b) => a - b);
    const med = de.length ? de[Math.floor(de.length / 2)] : 0, p95 = de.length ? de[Math.floor(de.length * .95)] : 0;

    pt.textContent = 'Building ICC profile...'; pb.style.width = '85%';
    const gp = parseInt(document.getElementById('clutSize').value);
    const uLab = uPatches.map(p => toLab(p.spectra));
    uPatches[0].cmyk; // unused, we use uLab for gamut
    const cl = allocateCLUT(3, 3, gp);
    const printCl = allocateCLUT(3, 3, gp);
    const GAMUT_THRESHOLD = 40;
    for (let i = 0; i < gp; i++) for (let j = 0; j < gp; j++) for (let k = 0; k < gp; k++) {
      const Lt = 100 * i / (gp - 1), at = -128 + 255 * j / (gp - 1), bt = -128 + 255 * k / (gp - 1);
      let bD = Infinity, bI = 0; for (let pi = 0; pi < uLab.length; pi++) { const d = Math.hypot(uLab[pi][0] - Lt, uLab[pi][1] - at, uLab[pi][2] - bt); if (d < bD) { bD = d; bI = pi; } }
      if (bD > GAMUT_THRESHOLD) {
        // Out of printer gamut → identity (no simulation)
        printCl.setter([i, j, k], labToLab8(Lt, at, bt));
        cl.setter([i, j, k], labToLab8(Lt, at, bt));
      } else {
        // Print simulation: nearest unlaminated patch Lab
        const [pL, pa, pb_v] = toLab(uPatches[bI].spectra);
        printCl.setter([i, j, k], labToLab8(pL, pa, pb_v));
        // Laminated: predicted Lab after DeviceLink
        cl.setter([i, j, k], labToLab8(predLab[bI][0], predLab[bI][1], predLab[bI][2]));
      }
    }
    iccBuf = buildDeviceLink({ inputChannels: 3, outputChannels: 3, clutPoints: gp, clutData: cl.array, description: `P95=${p95.toFixed(2)}` });
    _clutData = cl.array; _printClutData = printCl.array; _clutPoints = gp;

    pb.style.width = '100%'; pt.textContent = 'Done!';
    document.getElementById('statP').textContent = uPatches.length;
    document.getElementById('statA').textContent = pairs.length;
    document.getElementById('statMed').textContent = `ΔE ${med.toFixed(2)}`;
    document.getElementById('statP95').textContent = `ΔE ${p95.toFixed(2)}`;
    document.getElementById('previewArea').classList.remove('hidden');
    ra.classList.remove('hidden');
    const sel = document.getElementById('imgSelect');
    if (sel.value && !_printOffscreen) loadImageFromUrl(sel.value);
    setTimeout(() => { pa.classList.add('hidden'); btn.disabled = false; }, 500);
  } catch (e) { pt.textContent = 'Error: ' + e.message; pt.classList.add('text-red-600'); btn.disabled = false; console.error(e); }
};

document.getElementById('dlBtn').onclick = () => {
  if (iccBuf) { const b = new Blob([iccBuf], { type: 'application/vnd.iccprofile' }); const u = URL.createObjectURL(b); const a = document.createElement('a'); a.href = u; a.download = 'lamination-devicelink.icc'; a.click(); URL.revokeObjectURL(u); }
};

// ---- Preview: image processing ----
function processFullImage(imgData) {
  const w = imgData.width, h = imgData.height;
  const src = imgData.data;
  const printArr = new Uint8ClampedArray(src.length);
  const lamArr = new Uint8ClampedArray(src.length);
  const t0 = performance.now();
  for (let i = 0; i < src.length; i += 4) {
    const [L, a, b] = srgbToLab(src[i], src[i+1], src[i+2]);
    const [Lp, ap, bp] = applyCLUT([L, a, b], _printClutData, _clutPoints);
    const [rp, gp, bp2] = labToSrgb(Lp, ap, bp);
    printArr[i] = rp; printArr[i+1] = gp; printArr[i+2] = bp2; printArr[i+3] = 255;
    const [Ld, ad, bd] = applyCLUT([L, a, b], _clutData, _clutPoints);
    const [rd, gd, bd2] = labToSrgb(Ld, ad, bd);
    lamArr[i] = rd; lamArr[i+1] = gd; lamArr[i+2] = bd2; lamArr[i+3] = 255;
  }
  _printOffscreen = new OffscreenCanvas(w, h);
  _printOffscreen.getContext('2d').putImageData(new ImageData(printArr, w, h), 0, 0);
  _lamOffscreen = new OffscreenCanvas(w, h);
  _lamOffscreen.getContext('2d').putImageData(new ImageData(lamArr, w, h), 0, 0);
  return performance.now() - t0;
}

function getZoomTransform(cw, ch) {
  const fitScale = Math.min(cw / _fullW, ch / _fullH);
  const scale = _zoomFit ? fitScale : _zoom;
  const iw = _fullW * scale, ih = _fullH * scale;
  const ox = (cw - iw) / 2 + _panX, oy = (ch - ih) / 2 + _panY;
  return { scale, iw, ih, ox, oy, fitScale };
}

function renderPreview() {
  const container = document.getElementById('previewContainer');
  const canvas = document.getElementById('previewCanvas');
  const ctx = canvas.getContext('2d');
  const cw = container.clientWidth, ch = container.clientHeight;
  canvas.width = cw; canvas.height = ch;
  ctx.imageSmoothingEnabled = false;
  ctx.fillStyle = '#888'; ctx.fillRect(0, 0, cw, ch);

  if (!_printOffscreen) return;

  const t = getZoomTransform(cw, ch);
  const { scale, iw, ih, ox, oy } = t;

  const splitX = ox + _splitRatio * iw;

  // Left half: print simulation
  ctx.save();
  ctx.beginPath();
  ctx.rect(ox, oy, Math.max(0, splitX - ox), ih);
  ctx.clip();
  ctx.drawImage(_printOffscreen, ox, oy, iw, ih);
  ctx.restore();

  // Right half: laminated
  ctx.save();
  ctx.beginPath();
  ctx.rect(splitX, oy, Math.max(0, (ox + iw) - splitX), ih);
  ctx.clip();
  ctx.drawImage(_lamOffscreen, ox, oy, iw, ih);
  ctx.restore();

  // Split line
  const sl = document.getElementById('splitLine');
  sl.style.display = 'block';
  sl.style.left = splitX + 'px';

  // Zoom label
  const zl = document.getElementById('zoomLabel');
  zl.textContent = _zoomFit ? 'fit' : Math.round(scale / t.fitScale * 100) + '%';

  // Update cursor for pan
  if (_zoomFit || scale <= t.fitScale) container.style.cursor = 'default';
  else container.style.cursor = _isDraggingCanvas ? 'grabbing' : 'grab';

  // Navigator
  renderNavigator(t);
}

function renderNavigator(t) {
  const nav = document.getElementById('navigator');
  nav.style.display = 'block';
  const nc = document.getElementById('navCanvas');
  const nw = nc.clientWidth, nh = nc.clientHeight;
  nc.width = nw; nc.height = nh;
  const nctx = nc.getContext('2d');
  nctx.imageSmoothingEnabled = true;

  const nScale = Math.min(nw / _fullW, nh / _fullH);
  const niw = _fullW * nScale, nih = _fullH * nScale;
  const nox = (nw - niw) / 2, noy = (nh - nih) / 2;

  nctx.fillStyle = '#444'; nctx.fillRect(0, 0, nw, nh);

  const nSplitX = nox + _splitRatio * niw;

  nctx.save();
  nctx.beginPath();
  nctx.rect(nox, noy, Math.max(0, nSplitX - nox), nih);
  nctx.clip();
  nctx.drawImage(_printOffscreen, nox, noy, niw, nih);
  nctx.restore();

  nctx.save();
  nctx.beginPath();
  nctx.rect(nSplitX, noy, Math.max(0, (nox + niw) - nSplitX), nih);
  nctx.clip();
  nctx.drawImage(_lamOffscreen, nox, noy, niw, nih);
  nctx.restore();

  // Viewport rectangle (only when zoomed in)
  const vr = document.getElementById('navViewport');
  const cw = document.getElementById('previewContainer').clientWidth;
  const ch = document.getElementById('previewContainer').clientHeight;
  if (_zoomFit || t.scale <= t.fitScale * 1.01) {
    vr.style.display = 'none';
  } else {
    const vx = (-t.ox / t.iw) * niw + nox;
    const vy = (-t.oy / t.ih) * nih + noy;
    const vw = (cw / t.scale / _fullW) * niw;
    const vh = (ch / t.scale / _fullH) * nih;
    vr.style.display = 'block';
    vr.style.left = Math.max(nox, vx) + 'px';
    vr.style.top = Math.max(noy, vy) + 'px';
    vr.style.width = Math.min(niw, Math.max(4, vw)) + 'px';
    vr.style.height = Math.min(nih, Math.max(4, vh)) + 'px';
  }
}

// Load and process an image
async function loadImageToProcessor(img) {
  if (!_clutData) return;
  _fullW = img.naturalWidth || img.width;
  _fullH = img.naturalHeight || img.height;
  const tmpC = new OffscreenCanvas(_fullW, _fullH);
  const tmpCtx = tmpC.getContext('2d');
  tmpCtx.drawImage(img, 0, 0);
  const imgData = tmpCtx.getImageData(0, 0, _fullW, _fullH);
  const ms = processFullImage(imgData);
  _splitRatio = 0.5; _zoomFit = true; _panX = 0; _panY = 0;
  renderPreview();
  document.getElementById('previewStatus').textContent = `Loaded ${_fullW}×${_fullH} (processed in ${ms.toFixed(0)}ms)`;
}

// Upload file
document.getElementById('fileImg').onchange = e => {
  const f = e.target.files[0];
  if (!f) return;
  const img = new Image();
  img.onload = () => loadImageToProcessor(img);
  img.src = URL.createObjectURL(f);
};

function clampPan(cw, ch) {
  const t = getZoomTransform(cw, ch);
  const maxPanX = Math.max(0, (t.iw - cw) / 2);
  const maxPanY = Math.max(0, (t.ih - ch) / 2);
  if (maxPanX === 0) _panX = 0;
  else _panX = Math.max(-maxPanX, Math.min(maxPanX, _panX));
  if (maxPanY === 0) _panY = 0;
  else _panY = Math.max(-maxPanY, Math.min(maxPanY, _panY));
}

// ---- Split drag + Canvas pan + Navigator drag ----
const container = document.getElementById('previewContainer');
const splitLine = document.getElementById('splitLine');

splitLine.onmousedown = e => { _isDraggingSplit = true; e.preventDefault(); };

container.onmousedown = e => {
  if (e.target === splitLine) return;
  const t = getZoomTransform(container.clientWidth, container.clientHeight);
  if (!_zoomFit && t.scale > t.fitScale * 1.01) {
    _isDraggingCanvas = true;
    _dragStartX = e.clientX;
    _dragStartY = e.clientY;
    _dragStartPanX = _panX;
    _dragStartPanY = _panY;
    container.style.cursor = 'grabbing';
    e.preventDefault();
  }
};

document.onmousemove = e => {
  if (_isDraggingSplit) {
    const rect = container.getBoundingClientRect();
    _splitRatio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    renderPreview();
  } else if (_isDraggingCanvas) {
    _panX = _dragStartPanX + (e.clientX - _dragStartX);
    _panY = _dragStartPanY + (e.clientY - _dragStartY);
    clampPan(container.clientWidth, container.clientHeight);
    renderPreview();
  }
};

document.onmouseup = () => {
  _isDraggingSplit = false;
  _isDraggingCanvas = false;
  if (!_zoomFit) container.style.cursor = 'grab';
};

// Mouse wheel zoom
container.onwheel = e => {
  e.preventDefault();
  const t = getZoomTransform(container.clientWidth, container.clientHeight);
  const fitScale = t.fitScale;
  if (_zoomFit) {
    _zoomFit = false;
    _zoom = fitScale;
  }
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  _zoom = Math.max(fitScale * 0.1, Math.min(fitScale * 20, _zoom * delta));
  // Zoom toward cursor position
  const rect = container.getBoundingClientRect();
  const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
  const cw = container.clientWidth, ch = container.clientHeight;
  // Map cursor to image coords before zoom
  const prevT = getZoomTransform(cw, ch);
  const imgX = (cx - prevT.ox) / prevT.iw * _fullW;
  const imgY = (cy - prevT.oy) / prevT.ih * _fullH;
  // After zoom, adjust pan so cursor stays on same image point
  const newT = getZoomTransform(cw, ch);
  _panX = cx - imgX / _fullW * newT.iw - (cw - newT.iw) / 2;
  _panY = cy - imgY / _fullH * newT.ih - (ch - newT.ih) / 2;
  clampPan(cw, ch);
  renderPreview();
};

// Zoom buttons
document.getElementById('zoomFitBtn').onclick = () => {
  _zoomFit = true; _panX = 0; _panY = 0; renderPreview();
};
document.getElementById('zoom100Btn').onclick = () => {
  _zoomFit = false; _zoom = 1.0; _panX = 0; _panY = 0;
  renderPreview();
};

// Navigator click to pan
document.getElementById('navigator').onmousedown = e => {
  const nc = document.getElementById('navCanvas');
  const rect = nc.getBoundingClientRect();
  const nw = nc.width, nh = nc.height;
  const nx = e.clientX - rect.left, ny = e.clientY - rect.top;

  const nScale = Math.min(nw / _fullW, nh / _fullH);
  const niw = _fullW * nScale, nih = _fullH * nScale;
  const nox = (nw - niw) / 2, noy = (nh - nih) / 2;

  // Map navigator click to image coords
  const imgX = (nx - nox) / nScale, imgY = (ny - noy) / nScale;
  if (imgX < 0 || imgX >= _fullW || imgY < 0 || imgY >= _fullH) return;

  const cw = container.clientWidth, ch = container.clientHeight;
  const t = getZoomTransform(cw, ch);

  // Center viewport on clicked point
  _panX = (cw - t.iw) / 2 - imgX / _fullW * t.iw;
  _panY = (ch - t.ih) / 2 - imgY / _fullH * t.ih;

  clampPan(cw, ch);
  renderPreview();
};

// ---- Preview: color info on hover ----
document.getElementById('previewCanvas').onmousemove = e => {
  const canvas = document.getElementById('previewCanvas');
  const info = document.getElementById('colorInfo');
  const rect = canvas.getBoundingClientRect();
  const mx = Math.floor(e.clientX - rect.left);
  const my = Math.floor(e.clientY - rect.top);

  if (mx < 0 || mx >= canvas.width || my < 0 || my >= canvas.height) {
    info.classList.add('hidden'); return;
  }

  const canvasData = canvas.getContext('2d').getImageData(mx, my, 1, 1).data;
  const [cL, ca, cb_v] = srgbToLab(canvasData[0], canvasData[1], canvasData[2]);

  const cw = canvas.width, ch = canvas.height;
  const t = getZoomTransform(cw, ch);

  // Native image coords of hovered pixel
  const fx = (mx - t.ox) / t.scale, fy = (my - t.oy) / t.scale;
  if (fx < 0 || fx >= _fullW || fy < 0 || fy >= _fullH) { info.classList.add('hidden'); return; }

  const splitX = t.ox + _splitRatio * t.iw;
  const isRight = mx >= splitX;

  if (isRight) {
    const printCtx = _printOffscreen.getContext('2d');
    const printPd = printCtx.getImageData(Math.round(fx), Math.round(fy), 1, 1).data;
    const [pL, pa, pb] = srgbToLab(printPd[0], printPd[1], printPd[2]);
    const de = deltaE00(pL, pa, pb, cL, ca, cb_v);
    const warn = de > 5 ? ' <span style="color:#fbb">⚠ lamination effect >5 ΔE</span>' : '';
    info.innerHTML = `<b>(${Math.round(fx)},${Math.round(fy)})</b>${warn}
Print:   Lab(${pL.toFixed(1)},${pa.toFixed(1)},${pb.toFixed(1)})
Lam:     Lab(${cL.toFixed(1)},${ca.toFixed(1)},${cb_v.toFixed(1)})
<b>ΔE00 = ${de.toFixed(2)}</b>`;
  } else {
    info.innerHTML = `<b>(${Math.round(fx)},${Math.round(fy)})</b>
Print:   Lab(${cL.toFixed(1)},${ca.toFixed(1)},${cb_v.toFixed(1)})
<i>Right half = after lamination</i>`;
  }
  info.classList.remove('hidden');
};

document.getElementById('previewCanvas').onmouseleave = () => {
  document.getElementById('colorInfo').classList.add('hidden');
};

// ---- import helpers from app bundle ----
import { spectralToXYZ, xyzToLab, deltaE00, ridgeFit, buildDeviceLink, allocateCLUT, labToLab8, srgbToLab, labToSrgb, applyCLUT } from '/dist/app.js';
function toLab(s) { const [X, Y, Z] = spectralToXYZ(Array.from(s)); return xyzToLab(X, Y, Z); }
</script>
